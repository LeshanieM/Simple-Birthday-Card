<!DOCTYPE html>
<html>
  <head>
    <title>Happy Birthday!</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <!-- Floating Hearts -->
    <div class="hearts"></div>

    <div class="card">
      <h1>🎀 Happy Birthday <span id="name">Friend 💗</span></h1>

      <p class="message">
        Wishing you a year full of happiness, creativity, laughter and
        everything lovely ✨💝
      </p>

      <button onclick="showMessage()">💝 Click for my wish 💝</button>
      <p id="hiddenMessage" class="hidden">
        May the world give you all the kindness it holds.🌷
      </p>
    </div>

    <!-- Background Music -->
    <audio id="bgMusic" loop>
      <source src="music.mp3" type="audio/mpeg" />
    </audio>

    <!-- Music Button -->
    <button class="music-btn" onclick="toggleMusic()">
      🎵 Play / Pause Music
    </button>

    <script src="script.js"></script>
  </body>
</html>
